name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "bee-content/research/**/*.py"
      - "bee-content/research/pyproject.toml"
      - "bee-content/video-editor/**/*.py"
      - "bee-content/video-editor/pyproject.toml"
      - "bee-restaurant-project/src/**"
      - "bee-restaurant-project/tests/**"
      - "bee-restaurant-project/package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "bee-content/research/**/*.py"
      - "bee-content/research/pyproject.toml"
      - "bee-content/video-editor/**/*.py"
      - "bee-content/video-editor/pyproject.toml"
      - "bee-restaurant-project/src/**"
      - "bee-restaurant-project/tests/**"
      - "bee-restaurant-project/package.json"
      - ".github/workflows/ci.yml"

jobs:
  test-research:
    name: bee-content/research
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bee-content/research
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -v

  test-video-editor:
    name: bee-content/video-editor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bee-content/video-editor
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev --extra web --extra otio --extra animation --extra maps
      - run: uv run pytest tests/ -v

  test-restaurant:
    name: bee-restaurant-project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bee-restaurant-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bee-restaurant-project/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
